<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>빵굽는 지도, 커피 한 잔</title>
  <!-- OpenGraph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="빵굽는 지도, 커피 한 잔">
  <meta property="og:description" content="내가 체크한 부산/울산/대구/경북 카페와 빵집 모음">
  <meta property="og:url" content="https://sooyeon-11.github.io/bread-coffee/">
  <meta property="og:image" content="https://sooyeon-11.github.io/bread-coffee/images/og_img.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="preconnect" href="https://ldb-phinf.pstatic.net">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <h1 class="logo">🥐 빵굽는 지도, 커피 한 잔 ☕</h1>
      </div>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="16" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" placeholder="매장 이름이나 주소로 검색..." autocomplete="off">
        <button id="searchClear" class="search-clear" hidden>&times;</button>
      </div>
    </div>
  </header>

  <!-- Region Tabs -->
  <nav class="tabs-section">
    <div class="tabs-scroll-wrapper" id="tabsWrapper">
      <!-- 1줄: 지역 -->
      <div class="tabs-row" id="regionTabs">
        <button class="tab tab-main active" data-region="부산" data-type="main">부산</button>
        <button class="tab tab-main" data-region="울산" data-type="main">울산</button>
        <button class="tab tab-main" data-region="대구" data-type="main">대구</button>
        <button class="tab tab-main" data-region="경북" data-type="main">경북</button>
      </div>
      <!-- 2줄: 동네 (부산일 때만) -->
      <div class="tabs-row sub-tabs" id="subTabs">
        <button class="tab tab-sub active" data-sub="all">전체</button>
        <button class="tab tab-sub" data-sub="전포">전포</button>
        <button class="tab tab-sub" data-sub="서면">서면</button>
        <button class="tab tab-sub" data-sub="광안리">광안리</button>
        <button class="tab tab-sub" data-sub="해운대">해운대</button>
        <button class="tab tab-sub" data-sub="연제구">연제구</button>
        <button class="tab tab-sub" data-sub="수영">수영</button>
        <button class="tab tab-sub" data-sub="영도">영도</button>
        <button class="tab tab-sub" data-sub="기장">기장</button>
        <button class="tab tab-sub" data-sub="금정구">금정구</button>
        <button class="tab tab-sub" data-sub="남포/중구">남포/중구</button>
        <button class="tab tab-sub" data-sub="동래">동래</button>
        <button class="tab tab-sub" data-sub="기타">기타</button>
      </div>
      <button class="sub-tabs-toggle" id="subTabsToggle">더보기 ▾</button>
      <!-- 3줄: 카테고리 -->
      <div class="tabs-row cat-tabs" id="catTabs">
        <button class="tab-cat active" data-cat="all">전체</button>
        <button class="tab-cat" data-cat="카페">☕ 카페</button>
        <button class="tab-cat" data-cat="베이커리">🥐 베이커리</button>
        <button class="tab-cat" data-cat="디저트">🍰 디저트</button>
        <button class="tab-cat" data-cat="브런치">🍳 브런치</button>
      </div>
    </div>
  </nav>

  <!-- Store Cards -->
  <main class="main-content">
    <section class="cards-section">
      <div class="cards-header">
        <h2 id="sectionTitle">부산 카페 & 빵집</h2>
        <span id="storeCount" class="store-count"></span>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
      <div class="load-more-wrap" id="loadMoreWrap" hidden>
        <button id="loadMoreBtn" class="load-more-btn">더 보기</button>
      </div>
    </section>

    <!-- Map -->
    <section class="map-section">
      <h2 class="map-title">지도에서 보기</h2>
      <div id="map" class="map-container"></div>
    </section>

    <!-- Instagram Section -->
    <section class="insta-section">
      <h2 class="insta-section-title">주인장의 카페 후기</h2>
      <p class="insta-section-desc">직접 다녀온 카페와 빵집 후기를 인스타그램에서 확인하세요</p>
      <a class="insta-profile-card" href="https://www.instagram.com/xujji_/" target="_blank" rel="noopener">
        <div class="insta-profile-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#e6683c" stroke-width="2"/><circle cx="12" cy="12" r="5" stroke="#e6683c" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="#e6683c"/></svg>
        </div>
        <div class="insta-profile-info">
          <span class="insta-profile-id">@xujji_</span>
          <span class="insta-profile-label">카페 & 빵집 후기 보러가기 &rarr;</span>
        </div>
      </a>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-insta">
      <a href="https://www.instagram.com/xujji_/" target="_blank" rel="noopener" class="footer-insta-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
        @xujji_
      </a>
      <a href="https://www.instagram.com/xuvea2/" target="_blank" rel="noopener" class="footer-insta-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
        @xuvea2
      </a>
    </div>
    <p>&copy; youn.so</p>
  </footer>

  <!-- Store Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-scroll">
        <!-- Image Slider -->
        <div class="slider" id="modalSlider">
          <div class="slider-track" id="sliderTrack"></div>
          <button class="slider-arrow slider-prev" id="sliderPrev">&lsaquo;</button>
          <button class="slider-arrow slider-next" id="sliderNext">&rsaquo;</button>
          <div class="slider-dots" id="sliderDots"></div>
        </div>

        <!-- Modal Tabs (Naver Map style) -->
        <div class="modal-tabs">
          <button class="modal-tab active" data-modal-tab="home">홈</button>
          <button class="modal-tab" data-modal-tab="menu">메뉴</button>
          <button class="modal-tab" data-modal-tab="review">리뷰</button>
          <button class="modal-tab" data-modal-tab="info">정보</button>
        </div>

        <!-- Tab: Home -->
        <div class="modal-tab-content active" id="tabHome">
          <div class="modal-body">
            <div class="modal-header">
              <h3 id="modalName"></h3>
              <span class="modal-badge" id="modalBadge"></span>
            </div>
            <p class="micro-review" id="modalMicroReview" hidden></p>
            <div class="modal-info">
              <p id="modalAddress"></p>
              <p id="modalPhone"></p>
              <p id="modalHours"></p>
              <p id="modalSubway" hidden></p>
            </div>
            <div class="modal-links" id="modalLinks"></div>
          </div>
        </div>

        <!-- Tab: Menu -->
        <div class="modal-tab-content" id="tabMenu">
          <div class="modal-body">
            <div class="menu-list" id="menuList"></div>
          </div>
        </div>

        <!-- Tab: Review -->
        <div class="modal-tab-content" id="tabReview">
          <div class="modal-body">
            <div class="review-summary" id="reviewSummary"></div>
            <div class="visitor-reviews" id="visitorReviews"></div>
            <h4 class="review-section-title" id="blogReviewsTitle" hidden>블로그 리뷰</h4>
            <div class="blog-reviews" id="blogReviews"></div>
            <a class="modal-link-btn naver-btn review-more-link" id="reviewMoreLink" href="#" target="_blank" rel="noopener">
              리뷰 더보기 &rarr;
            </a>
          </div>
        </div>

        <!-- Tab: Info -->
        <div class="modal-tab-content" id="tabInfo">
          <div class="modal-body">
            <div class="info-section" id="infoConveniences" hidden>
              <h4 class="info-section-title">편의시설</h4>
              <div class="info-tags" id="conveniencesList"></div>
            </div>
            <div class="info-section" id="infoSeat" hidden>
              <h4 class="info-section-title">좌석</h4>
              <div class="info-tags" id="seatList"></div>
            </div>
            <div class="info-section" id="infoRoad" hidden>
              <h4 class="info-section-title">오시는 길</h4>
              <p class="info-road-text" id="roadGuideText"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Review Detail Overlay -->
  <div class="review-detail-overlay" id="reviewDetailOverlay" hidden>
    <div class="review-detail">
      <button class="review-detail-close" id="reviewDetailClose">&times;</button>
      <div class="review-detail-images" id="reviewDetailImages"></div>
      <div class="review-detail-body">
        <div class="review-detail-author" id="reviewDetailAuthor"></div>
        <div class="review-detail-text" id="reviewDetailText"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
